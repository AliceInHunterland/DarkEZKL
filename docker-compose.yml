services:
  test:
    image: dark-ezkl:bench
    build:
      context: .
      dockerfile: Dockerfile

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]

    working_dir: /app

    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864

    environment:
      ENABLE_ICICLE_GPU: "true"
      ICICLE_SMALL_K: "${ICICLE_SMALL_K:-0}"

      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      TORCH_HOME: /app/.cache/torch
      XDG_CACHE_HOME: /app/.cache
      HF_HOME: /app/.cache/huggingface
      HF_HUB_DISABLE_TELEMETRY: "1"

      EZKL_ONNX_PRECISION: "${EZKL_ONNX_PRECISION:-fp16}"
      EZKL_CHECK_MODE: "${EZKL_CHECK_MODE:-unsafe}"
      EZKL_LOOKUP_SAFETY_MARGIN: "${EZKL_LOOKUP_SAFETY_MARGIN:-1.02}"
      EZKL_SRS_SOURCE: "${EZKL_SRS_SOURCE:-auto}"
      EZKL_SRS_MAX_DUMMY_LOGROWS: "${EZKL_SRS_MAX_DUMMY_LOGROWS:-22}"

      PYTHONFAULTHANDLER: "1"
      MALLOC_ARENA_MAX: "2"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

      ISOLATE_MODELS: "${ISOLATE_MODELS:-true}"
      MODEL_PROCESS_TAIL_LINES: "${MODEL_PROCESS_TAIL_LINES:-250}"

      SPLIT_ONNX: "${SPLIT_ONNX:-true}"
      SPLIT_MIN_PARAMS_M: "${SPLIT_MIN_PARAMS_M:-0.05}"

    volumes:
      - ./results:/app/results
      - ./cache:/app/.cache
      - ./.ezkl:/root/.ezkl

    command: >-
      python3 /app/benchmark.py
      --outdir /app/results
      --models ${BENCHMARK_MODELS:-lenet-5-small,repvgg-a0,vit}
      --prob-k-values ${BENCHMARK_PROB_K_VALUES:-2,4}
      --runs ${BENCHMARK_RUNS:-3}
